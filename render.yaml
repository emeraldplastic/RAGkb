services:
  - type: web
    name: ragkb
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: ragkb-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_PATH
        value: /var/data/ragkb.db
      - key: CHROMA_PATH
        value: /var/data/chroma_db
      - key: UPLOAD_DIR
        value: /var/data/uploaded_docs
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: EMBED_MODEL
        value: text-embedding-3-small
      - key: LLM_MODEL
        value: gpt-4o-mini
